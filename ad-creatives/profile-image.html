<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<!--
  TalkB Profile Image — 1080×1080
  인스타 프로필 (원형 크롭 대응, 로고만)
-->
<title>TalkB Profile Image</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --accent:    #E85D3A;
  --ink:       #0A0A0A;
  --ink-muted: #757575;
  --f: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1080px; height: 1080px;
  overflow: hidden; background: #F8F5EF;
  font-family: var(--f); -webkit-font-smoothing: antialiased;
}
.canvas {
  width: 1080px; height: 1080px;
  display: flex; align-items: center; justify-content: center;
}
/* 세로 2단 묶음 — 정중앙 정렬 */
.logo-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}
/* 1줄: TalkB — 정사각 폭 약 55~58% */
.logo-text {
  font-size: 190px; font-weight: 900;
  color: var(--ink); letter-spacing: -0.055em; line-height: 1;
  white-space: nowrap;
}
/* 2줄: ● 토크비 */
.logo-sub {
  display: flex; align-items: center; gap: 14px;
}
.logo-dot {
  width: 20px; height: 20px;
  background: var(--accent); border-radius: 50%; flex-shrink: 0;
}
.logo-kr {
  font-size: 80px; font-weight: 500;
  color: var(--ink-muted); letter-spacing: -0.03em; line-height: 1;
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="logo-wrap">
    <span class="logo-text">TalkB</span>
    <div class="logo-sub">
      <span class="logo-dot"></span>
      <span class="logo-kr">토크비</span>
    </div>
  </div>
</div>
</body>
</html>
