<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<!--
  ╔══════════════════════════════════════════════════════╗
  ║  TalkB Ad A — 공포 + 독점  (1080×1080)              ║
  ╠══════════════════════════════════════════════════════╣
  ║  캡처 방법                                           ║
  ║  1. Chrome DevTools > Toggle device toolbar          ║
  ║     → 1080×1080 지정 → Cmd+Shift+P > "Capture       ║
  ║       full size screenshot"                          ║
  ║  2. 헤드리스:                                        ║
  ║     chrome --headless --screenshot=ad-a.png          ║
  ║       --window-size=1080,1080                        ║
  ║       --hide-scrollbars file://$(pwd)/ad-a.html      ║
  ╚══════════════════════════════════════════════════════╝
-->
<title>TalkB Ad A</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --accent:       #E85D3A;
  --accent-deep:  #C94422;
  --accent-soft:  #FFF1EC;
  --ink:          #0A0A0A;
  --ink-mid:      #52525B;
  --ink-muted:    #757575;
  --bg:           #FFFFFF;
  --bg-soft:      #FAFAFA;
  --border:       #E4E4E7;
  --success:      #16A34A;
  --f: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1080px; height: 1080px;
  overflow: hidden; background: var(--bg);
  font-family: var(--f); -webkit-font-smoothing: antialiased;
}

/* Canvas */
.canvas {
  width: 1080px; height: 1080px;
  padding: 64px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  background: linear-gradient(160deg, #fff 60%, #FFF7F3 100%);
}

/* Accent corner decoration */
.canvas::before {
  content: '';
  position: absolute; top: -80px; right: -80px;
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(232,93,58,0.10) 0%, transparent 68%);
  pointer-events: none;
}
.canvas::after {
  content: '';
  position: absolute; bottom: -60px; left: -60px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(232,93,58,0.06) 0%, transparent 68%);
  pointer-events: none;
}

/* ── TOP ─────────────────────────────────────────── */
.top { flex: 0 0 auto; }

.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 24px; font-weight: 500; color: var(--ink-muted);
  letter-spacing: -0.01em; margin-bottom: 22px;
}
.eyebrow::before {
  content: ''; width: 8px; height: 8px;
  background: var(--accent); border-radius: 50%; flex-shrink: 0;
}

.hook { margin-bottom: 0; }
/* 받쳐주는 설정 줄 — 눈에 띄되 payoff 압도 안 함 */
.hook-setup {
  display: block; font-size: 40px; font-weight: 700;
  color: var(--ink-mid); letter-spacing: -0.03em; line-height: 1.25; margin-bottom: 4px;
}
/* 메인 payoff — 이미지에서 가장 큰 요소 */
.hook-payoff {
  display: block; font-size: 104px; font-weight: 900;
  color: var(--ink); letter-spacing: -0.055em; line-height: 1.0;
}
.hook-payoff .accent { color: var(--accent); }

/* ── MIDDLE — GPT Card ───────────────────────────── */
.mid { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; padding: 28px 0; }

.gpt-card {
  background: #ffffff; border-radius: 20px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 6px 32px rgba(0,0,0,0.08);
  overflow: hidden; max-width: 680px; margin: 0 auto; width: 100%;
}
.gpt-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: #fff;
  border-bottom: 1px solid #f0f0f0;
}
.gpt-ham { display: flex; flex-direction: column; gap: 4px; }
.gpt-ham span { display: block; height: 2px; width: 18px; background: #9ca3af; border-radius: 1px; }
.gpt-logo { flex: 1; font-size: 17px; font-weight: 700; color: #111827; letter-spacing: -0.02em; }
.gpt-logo small { font-size: 13px; color: #9ca3af; font-weight: 400; margin-left: 4px; }
.gpt-edit { font-size: 18px; color: #9ca3af; }

.gpt-body { padding: 16px 16px; display: flex; flex-direction: column; gap: 10px; }

.msg-user { display: flex; justify-content: flex-end; align-items: flex-end; gap: 10px; }
.bubble-user {
  padding: 10px 14px; background: #f3f4f6; color: #111827;
  border-radius: 18px 4px 18px 18px; font-size: 15px; line-height: 1.5;
  max-width: 80%; letter-spacing: -0.01em;
}
.av-user {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  background: #e5e7eb; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #6b7280;
}

.msg-ai { display: flex; align-items: flex-start; gap: 10px; }
.av-ai {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  background: #111827; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.bubble-ai {
  flex: 1; padding: 10px 14px;
  background: #f9fafb; border: 1px solid #e5e7eb;
  border-radius: 4px 18px 18px 18px;
  font-size: 15px; color: #1f2937; line-height: 1.6; letter-spacing: -0.01em;
}
.bubble-ai strong { color: #059669; font-weight: 700; }

.gpt-caption {
  padding: 9px 18px; font-size: 12px; color: #9ca3af;
  text-align: center; border-top: 1px solid #f3f4f6;
}

.no-us {
  margin-top: 16px; text-align: center;
  font-size: 28px; font-weight: 800; color: var(--accent);
  letter-spacing: -0.03em;
}

/* ── BOTTOM ──────────────────────────────────────── */
.bot { flex: 0 0 auto; }

.solution {
  font-size: 26px; font-weight: 600; color: var(--ink-mid);
  letter-spacing: -0.02em; margin-bottom: 18px;
  text-align: center;
}
.solution strong { color: var(--ink); }

.badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--accent); color: #fff;
  font-size: 22px; font-weight: 700; padding: 12px 28px;
  border-radius: 100px; letter-spacing: -0.01em;
  margin-bottom: 22px;
}
.badge-wrap { text-align: center; }

.logo-bar {
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.logo-text {
  font-size: 26px; font-weight: 800; color: var(--ink); letter-spacing: -0.04em;
}
.logo-dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; }
.logo-kr { font-size: 16px; color: var(--ink-muted); font-weight: 500; }
</style>
</head>
<body>
<div class="canvas">

  <!-- TOP: eyebrow + hook -->
  <div class="top">
    <div class="eyebrow">식당·카페 사장님이라면</div>
    <div class="hook">
      <span class="hook-setup">손님이 ChatGPT에 "○○동 맛집" 물으면,</span>
      <span class="hook-payoff"><span class="accent">옆집</span>이 나옵니다</span>
    </div>
  </div>

  <!-- MID: GPT mockup -->
  <div class="mid">
    <div class="gpt-card">
      <div class="gpt-header">
        <div class="gpt-ham"><span></span><span></span><span></span></div>
        <div class="gpt-logo">ChatGPT <small>4o</small></div>
        <span class="gpt-edit">✎</span>
      </div>
      <div class="gpt-body">
        <div class="msg-user">
          <div class="bubble-user">광진구 가족 모임 한식당 추천해줘</div>
          <div class="av-user">나</div>
        </div>
        <div class="msg-ai">
          <div class="av-ai">AI</div>
          <div class="bubble-ai">
            광진구에서는 <strong>'가온한식'</strong>, <strong>'온정관'</strong>, <strong>'담소원'</strong>을 추천드립니다. 가온한식은 룸이 있어 모임에 조용하게 이용하기 좋습니다.
          </div>
        </div>
      </div>
      <div class="gpt-caption">ChatGPT 시뮬레이션 · 매장명은 가상 예시</div>
    </div>
    <div class="no-us">← 우리 가게는 없음</div>
  </div>

  <!-- BOTTOM: solution + badge + logo -->
  <div class="bot">
    <div class="solution">식당·카페 사장님 전용 <strong>AI 노출 최적화</strong> — 토크비</div>
    <div class="badge-wrap">
      <div class="badge">🗓 7월 얼리버드 사전신청 · 선착순 50팀</div>
    </div>
    <div class="logo-bar">
      <span class="logo-text">TalkB</span>
      <span class="logo-dot"></span>
      <span class="logo-kr">토크비</span>
    </div>
  </div>

</div>
</body>
</html>
