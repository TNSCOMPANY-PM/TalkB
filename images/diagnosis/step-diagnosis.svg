<svg width="330" height="440" viewBox="0 0 330 440" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#191F28" flood-opacity="0.06"/>
    </filter>
  </defs>
  <!-- card -->
  <rect x="8" y="8" width="314" height="424" rx="18" fill="#ffffff" stroke="#ECEEF1" stroke-width="1" filter="url(#s1)"/>

  <!-- brand + steps -->
  <text x="28" y="40" font-size="12.5" font-weight="800" fill="#E85D3A">TalkB 토크비</text>
  <text x="302" y="40" font-size="9.5" fill="#8B95A1" text-anchor="end">무료 진단</text>
  <text x="28" y="60" font-size="9.5" fill="#B8BFC8"><tspan fill="#E85D3A" font-weight="700">① 매장 연결</tspan>  ›  ② 질문 확인  ›  ③ 정보 입력  ›  ④ 결과</text>

  <!-- score box -->
  <rect x="28" y="72" width="274" height="86" rx="12" fill="#FAFBFC" stroke="#ECEEF1"/>
  <text x="165" y="94" font-size="9.5" fill="#8B95A1" text-anchor="middle">공개 정보만으로 측정한 현재 AI 노출률</text>
  <text x="165" y="132" font-size="34" font-weight="800" fill="#E85D3A" text-anchor="middle">10<tspan font-size="18">%</tspan></text>
  <text x="165" y="150" font-size="8.5" fill="#B8BFC8" text-anchor="middle">질문 10개 × 2회 = 20번 물었을 때 우리 매장이 나온 비율</text>

  <!-- section -->
  <text x="28" y="182" font-size="12.5" font-weight="800" fill="#191F28">AI가 실제로 이렇게 답했어요</text>
  <text x="28" y="197" font-size="9" fill="#8B95A1">질문을 누르면 AI 답변 전문을 볼 수 있어요.</text>

  <!-- Q block 1 -->
  <rect x="28" y="206" width="274" height="26" rx="8" fill="#F4F5F7"/>
  <text x="40" y="223" font-size="10.5" font-weight="700" fill="#191F28">강남구 대치동 덮밥집 추천해줘</text>
  <text x="290" y="223" font-size="9" fill="#B8BFC8" text-anchor="end">미노출</text>
  <text x="40" y="250" font-size="10" fill="#8B95A1">1회차 · 우리 매장 안 나옴</text>
  <text x="290" y="250" font-size="9.5" fill="#E85D3A" text-anchor="end">AI 답변 ▾</text>
  <line x1="40" y1="260" x2="290" y2="260" stroke="#F1F3F5"/>
  <text x="40" y="278" font-size="10" fill="#8B95A1">2회차 · 우리 매장 안 나옴</text>
  <text x="290" y="278" font-size="9.5" fill="#E85D3A" text-anchor="end">AI 답변 ▾</text>

  <!-- Q block 2 -->
  <rect x="28" y="294" width="274" height="26" rx="8" fill="#F4F5F7"/>
  <text x="40" y="311" font-size="10.5" font-weight="700" fill="#191F28">대치역 근처 점심 맛집 추천해줘</text>
  <text x="290" y="311" font-size="9" fill="#B8BFC8" text-anchor="end">미노출</text>
  <text x="40" y="338" font-size="10" fill="#8B95A1">1회차 · 우리 매장 안 나옴</text>
  <text x="290" y="338" font-size="9.5" fill="#E85D3A" text-anchor="end">AI 답변 ▾</text>
  <line x1="40" y1="348" x2="290" y2="348" stroke="#F1F3F5"/>
  <text x="40" y="366" font-size="10" fill="#8B95A1">2회차 · 우리 매장 안 나옴</text>
  <text x="290" y="366" font-size="9.5" fill="#E85D3A" text-anchor="end">AI 답변 ▾</text>

  <!-- peek: next question (faded, implies scroll) -->
  <rect x="28" y="378" width="274" height="22" rx="8" fill="#F7F8FA"/>
  <text x="40" y="393" font-size="10" fill="#C4CAD1">대치동 저녁 회식 장소 추천해줘</text>
  <text x="290" y="393" font-size="9" fill="#D6DBE0" text-anchor="end">미노출</text>

  <!-- more indicator -->
  <text x="165" y="420" font-size="9.5" font-weight="700" fill="#E85D3A" text-anchor="middle">▾ 아래로 질문 8개 더 있어요</text>
</svg>
