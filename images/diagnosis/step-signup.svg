<svg width="330" height="440" viewBox="0 0 330 440" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#191F28" flood-opacity="0.06"/>
    </filter>
  </defs>
  <!-- card -->
  <rect x="8" y="8" width="314" height="424" rx="18" fill="#ffffff" stroke="#ECEEF1" stroke-width="1" filter="url(#s2)"/>

  <!-- header -->
  <text x="28" y="44" font-size="14" font-weight="800" fill="#E85D3A">식별·위치 <tspan fill="#8B95A1" font-weight="600" font-size="11">(1/7)</tspan></text>
  <text x="302" y="44" font-size="10" fill="#8B95A1" text-anchor="end">옆으로 넘겨서 계속 →</text>

  <!-- 1 공식 매장명 -->
  <text x="28" y="76" font-size="11" fill="#8B95A1">공식 매장명</text>
  <rect x="28" y="84" width="274" height="32" rx="9" fill="#fff" stroke="#E5E8EB"/>
  <text x="42" y="105" font-size="12.5" font-weight="600" fill="#191F28">덮밥장사장 대치역점</text>

  <!-- 2 도로명 주소 -->
  <text x="28" y="146" font-size="11" fill="#8B95A1">도로명 주소</text>
  <rect x="28" y="154" width="274" height="32" rx="9" fill="#fff" stroke="#E5E8EB"/>
  <text x="42" y="175" font-size="12.5" font-weight="600" fill="#191F28">서울 강남구 남부순환로 2933</text>

  <!-- 3 동·역세권 -->
  <text x="28" y="216" font-size="11" fill="#8B95A1">동·역세권</text>
  <rect x="28" y="224" width="274" height="32" rx="9" fill="#fff" stroke="#E5E8EB"/>
  <text x="42" y="245" font-size="12.5" font-weight="600" fill="#191F28">대치동</text>

  <!-- 4 가까운역 -->
  <text x="28" y="286" font-size="11" fill="#8B95A1">가까운역</text>
  <rect x="28" y="294" width="274" height="32" rx="9" fill="#fff" stroke="#E5E8EB"/>
  <text x="42" y="315" font-size="12.5" font-weight="600" fill="#191F28">대치역 수인분당선</text>

  <!-- 5 대표 전화번호 (필수, placeholder) -->
  <text x="28" y="356" font-size="11" fill="#8B95A1">대표 전화번호 <tspan fill="#E85D3A" font-weight="700">필수</tspan></text>
  <rect x="28" y="364" width="274" height="32" rx="9" fill="#fff" stroke="#FFD9CC"/>
  <text x="42" y="385" font-size="11" fill="#B8BFC8">매장 실 대표번호 (안심번호 0507/0508 불가)</text>
</svg>
